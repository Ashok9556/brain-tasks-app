version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 115372765445.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image...
      - docker build -t mindtrack .
      - docker tag mindtrack:latest 115372765445.dkr.ecr.ap-south-1.amazonaws.com/mindtrack:latest

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 115372765445.dkr.ecr.ap-south-1.amazonaws.com/mindtrack:latest